<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous">
     <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'
    rel='stylesheet'> 
    <script src="https://kit.fontawesome.com/YOUR_KIT_CODE.js" crossorigin="anonymous"></script>
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
    }
    body{
        min-height: 100vh;
        background-image: url('../../assests/logooo.jpeg');
        background-size: cover;
        background-position: center;
    }

    .cadastro-center{
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
    }
    .container-cadastro{
        width: 490px;
        padding: 30px 40px;
        border: 2px solid rgba(253, 7, 7, 0.699);
        border-radius: 10px;
        color: aliceblue;
        box-shadow: 0 0 10px rgba(253, 7, 7, 0.699);
        align-items: center;
     
    }

    .container h1{
        font-size: 36px;
        align-items: center;
    }

    .input-box{
        position:relative;
        width: 100%;
        height: 50px;
        margin: 30px 0;
    }

    .input-box input{
        width: 100%;
        height: 100%;
        background-color: transparent;
        border: 2px solid ;
        border-radius: 40px;
        outline: none;
        font-size: 16px;
        color: #fff;
        padding: 20px 45px 20px 20px;
    }

    .input-box input::placeholder{
        color: #b2b2b2;
    }

    .input-box i{
        position: absolute;
        right: 20px;
        font-size: 20px;
        /*top: 30%; podemos usar dessa forma mais acaba não ficando totalmente no centro e tem oute tatica que pode ser usada que faz ficar bem alinhada*/
        top: 50%;
        transform: translateY(-50%); /*comando novo*/
    }

    .remember-forgot{
        display: flex;
        justify-content: space-between;
        margin: -15px 0 15px;
    }

    .remember-forgot label input{
        accent-color: #fff;
        margin-right: 4px;
    }

    .remember-forgot a{
        text-decoration: none;
        color: #fff;
    }

    .remember-forgot a:hover{
        text-decoration: underline;
    }

    .Cadastro{
        width: 100%;
        height: 50%;
        padding: 8px;
        border-radius: 10px;
        border: none;
        font-size: 17px;
        font-weight: 600;
        box-shadow: 0 0 10px rgba(0 , 0 , 0, 1);
    }

    .Cadastro:hover{
        background-color: transparent;
        border: 2px solid ;
        color: #fff;
        transition: 0.5s;
    }

    .navbar{
        background-color: #b91409
    }
   
    </style>
</head>
<body>

     <nav  id="navBar" class="navbar navbar-expand-lg ">
        <div class="container-fluid">

            <a class="navbar-brand fw-bold" href="#">
                D&D
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarTogglerDemo01"
                aria-controls="navbarTogglerDemo01"
                aria-expanded="false"
                aria-label="Toggle navigation">

                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarTogglerDemo01">

                <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Principal</a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link active" href="catalogo.html">Catalogo</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="sobre.html">Sobre nós</a>
                    </li>
                 </ul>

                <form class="d-flex" role="search">
                    <input class="form-control me-2"
                        type="search"
                        placeholder="Insira sua caça aqui">

                    <button class="btn btn-outline-danger" type="submit">
                        Caçar
                    </button>
                </form>

            </div>
        </div>
    </nav>

    <div class="cadastro-center">
      <form class="container-cadastro">
        <div class="textos">
            <h1>Cadastre-se agora</h1>
        </div>
        <div class="input-box">
            <input id="exampleInputName" placeholder="Digite o seu nome"  type="text">
            <i class="bx bxs-user"></i>
            <small id="NameHelp" class="form-text text-muted"></small>
          </div>
        <div class="input-box">
          <input placeholder="Digite seu email"  type="email"id="exampleInputEmail1" aria-describedby="emailHelp">
          <i class="bi bi-envelope"></i>
          <small id="EmailHelp" class="form-text text-muted"></small>
        </div>
        <div class="input-box">
          <input id="exampleInputPassword" placeholder="Digite sua senha" type="password">
          <i class="bx bxs-lock-alt"></i>
          <small id="passwordHelp" class="form-text text-muted"></small>
        </div>
        <div class="remember-forgot">
            <label>
                <input type="checkbox" id="CheckOne" class="form-check-input">
                Lembrar a senha
            </label>
            <a href="#">Esqueci a senha</a>
          
        </div>
        
        <div id="mensagem"></div>

        <button type="submit" class="Cadastro">
            Cadastrar
        </button>

        </form>
    </div>
 
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin
    ="anonymous"></script>
    <script src="../js/cadastro.js"></script>
</body>
</html>
